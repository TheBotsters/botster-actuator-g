name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -v ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o actuator-g-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/actuator-g

      - uses: actions/upload-artifact@v4
        with:
          name: actuator-g-${{ matrix.goos }}-${{ matrix.goarch }}
          path: actuator-g-${{ matrix.goos }}-${{ matrix.goarch }}
